# Serve the SPA when a browser reloads on a path that is also an API route.
# Only applies to GET requests — POST/PUT/DELETE are always API calls.
map $http_accept $accept_wants_html {
    default       0;
    ~*text/html   1;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API proxy ─────────────────────────────────────────────────────────────
    client_max_body_size 20m;

    location ~ ^/(auth|keys|instances|admin|health|contact-lists|group-lists|media|uploads) {
        # Browser hard-reload on an SPA route → serve the SPA (GET only; never rewrite API writes)
        set $do_spa_rewrite $accept_wants_html;
        if ($request_method != GET) { set $do_spa_rewrite 0; }
        if ($do_spa_rewrite) { rewrite ^ /index.html last; }

        proxy_pass http://backend:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for Server-Sent Events (QR / connection stream)
        proxy_set_header  Connection '';
        proxy_buffering   off;
        proxy_cache       off;
        chunked_transfer_encoding on;

        proxy_read_timeout 3600s;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header Referrer-Policy         strict-origin-when-cross-origin;

    # Cache static assets aggressively (Vite fingerprints them)
    location ~* \.(js|css|woff2?|svg|ico|png|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
