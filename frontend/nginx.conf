# Serve the SPA when a browser reloads on a path that is also an API route.
# Only applies to GET requests with no x-api-key — POST/PUT/DELETE and
# authenticated API calls are always proxied.
map $http_accept $accept_wants_html {
    default       0;
    ~*text/html   1;
}

map $http_x_api_key $has_api_key {
    default  0;
    ~.+      1;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API proxy ─────────────────────────────────────────────────────────────
    client_max_body_size 20m;

    # OAuth, MCP, and OIDC discovery — always proxy to backend, never rewrite to SPA
    location ~ ^/(oauth|mcp|\.well-known) {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        proxy_set_header  Connection '';
        proxy_buffering   off;
        proxy_cache       off;
        chunked_transfer_encoding on;

        proxy_read_timeout 3600s;
    }

    # Regular API routes — rewrite to SPA only on browser hard-reload of a matching path
    location ~ ^/(auth|keys|instances|admin|health|contact-lists|group-lists|media|uploads) {
        set $do_spa_rewrite $accept_wants_html;
        if ($request_method != GET) { set $do_spa_rewrite 0; }
        if ($has_api_key)           { set $do_spa_rewrite 0; }
        if ($do_spa_rewrite) { rewrite ^ /index.html last; }

        proxy_pass http://backend:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        proxy_set_header  Connection '';
        proxy_buffering   off;
        proxy_cache       off;
        chunked_transfer_encoding on;

        proxy_read_timeout 3600s;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff" always;
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection        "0" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-ancestors 'none';" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
    # Prevent CDN/proxy caches (e.g. Cloudflare) from caching API routes or the
    # SPA shell served for browser navigation to those paths.  Static assets
    # override this in the location block below via their own add_header.
    add_header Cache-Control           "no-store" always;

    # Cache static assets aggressively (Vite fingerprints them)
    location ~* \.(js|css|woff2?|svg|ico|png|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
